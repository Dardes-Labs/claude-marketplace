# Example medication config.
# Copy to ~/.medication/medications.toml and edit.
#
# Each [[medication]] has four fields — only `name` and `priority` are required:
#
#   name      — shown in notifications
#   priority  — "crucial" | "important" | "optional"
#   take      — when to take it. Use a keyword or a clock time:
#                 "morning"   = 07:00–10:00
#                 "noon"      = 11:00–13:00
#                 "afternoon" = 13:00–17:00
#                 "evening"   = 17:00–20:00
#                 "night"     = 20:00–23:00
#                 "anytime"   = any time of day
#                 "13:00"     = aim for this clock time (window extends 2 hours)
#               Default: "anytime".
#   deadline  — (optional) hard cut-off in HH:MM. After this, skip for today.
#               Leave out if you don't want a hard cut-off.
#   note      — (optional) free text shown in the notification.
#
# Behavior past the take-window when there's no deadline is decided by priority:
#   crucial   → keep reminding (escalates to "urgent")
#   important → stop quietly at end of window
#   optional  → stop quietly at end of window

[[medication]]
name = "Adderall XR"
priority = "crucial"
take = "morning"
note = "Take ASAP after waking."

[[medication]]
name = "Methylphenidate booster"
priority = "important"
take = "08:00"
deadline = "15:00"
note = "Take by 3pm or skip for today."


[[medication]]
name = "Multivitamin"
priority = "optional"
take = "anytime"
note = "With food."
